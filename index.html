<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HTML Tools — Free, fast, in your browser</title>
  <meta name="description" content="A growing collection of free, privacy-friendly browser tools. No sign-up, no tracking, everything runs locally." />
  <link rel="stylesheet" href="assets/style.css" />
  <!-- Set theme before paint to avoid flash -->
  <script>
    (function () {
      var t = localStorage.getItem("html-tools-theme") ||
        (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="./">
        <span class="logo">&lt;/&gt;</span>
        <span>HTML Tools</span>
      </a>
      <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Simple tools that just work</h1>
      <p>A growing collection of free browser tools. No sign-up, no tracking — everything runs locally on your device.</p>
      <div class="tools-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search" type="text" placeholder="Search tools…" autocomplete="off" />
      </div>
    </section>

    <section id="grid" class="tools-grid"></section>
  </main>

  <footer class="site-footer">
    <div class="container">
      Built for fun · Runs entirely in your browser ·
      <a href="https://github.com/ccrbd/HTML-Tools" target="_blank" rel="noopener">Source on GitHub</a>
    </div>
  </footer>

  <script src="assets/theme.js"></script>
  <script>
    /* ----------------------------------------------------------
       Add a new tool by appending one object below.
       href is relative to this homepage.
       ---------------------------------------------------------- */
    var TOOLS = [
      {
        name: "Word Counter",
        desc: "Count words, characters, sentences and reading time as you type.",
        icon: "🔤",
        href: "tools/word-counter/",
        keywords: "text words characters count letter writing"
      }
      // , { name: "...", desc: "...", icon: "...", href: "tools/.../", keywords: "..." }
    ];

    var grid = document.getElementById("grid");
    var search = document.getElementById("search");

    function render(list) {
      if (!list.length) {
        grid.innerHTML = '<div class="empty-state">No tools match your search.</div>';
        return;
      }
      grid.innerHTML = list.map(function (t) {
        return '<a class="tool-card" href="' + t.href + '">' +
          '<div class="tool-icon">' + t.icon + '</div>' +
          '<h3>' + t.name + '</h3>' +
          '<p>' + t.desc + '</p>' +
          '</a>';
      }).join("");
    }

    search.addEventListener("input", function () {
      var q = search.value.trim().toLowerCase();
      render(TOOLS.filter(function (t) {
        return (t.name + " " + t.desc + " " + (t.keywords || "")).toLowerCase().indexOf(q) > -1;
      }));
    });

    render(TOOLS);
  </script>
</body>
</html>
